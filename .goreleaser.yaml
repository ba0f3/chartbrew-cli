version: 2

project_name: chartbrew

builds:
  - id: chartbrew
    main: .
    binary: chartbrew
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/ba0f3/chartbrew-cli/cmd.Version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: ba0f3
    name: chartbrew-cli

# GoReleaser deprecated `brews` (formula generator for prebuilt binaries) in favor of
# `homebrew_casks` for the same workflow. This is still a CLI; Homebrew uses the cask
# pipe for vendored release archives, not because the app has a GUI.
homebrew_casks:
  - name: chartbrew
    ids:
      - default
    binaries:
      - chartbrew
    homepage: https://github.com/ba0f3/chartbrew-cli
    description: Agent-first CLI for the Chartbrew API
    repository:
      owner: ba0f3
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/chartbrew"] if OS.mac?
